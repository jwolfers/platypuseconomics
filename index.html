<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platypus Economics with Justin Wolfers</title>
    <meta name="description" content="Justin Wolfers — Economist, Professor, Author, Podcaster.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            background: #fafaf8;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 2rem;
        }

        .bio {
            font-size: 1.05rem;
            color: #333;
            margin-bottom: 2.5rem;
            line-height: 1.7;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        .links a {
            display: block;
            padding: 0.85rem 1.5rem;
            border: 1.5px solid #1a1a1a;
            border-radius: 8px;
            text-decoration: none;
            color: #1a1a1a;
            font-weight: 500;
            font-size: 1rem;
            transition: background 0.2s, color 0.2s;
        }

        .links a:hover {
            background: #1a1a1a;
            color: #fafaf8;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .socials a {
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .coming-soon {
            font-size: 1.2rem;
            color: #888;
            font-style: italic;
            margin-top: 1.5rem;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Platypus Economics</h1>
        <p class="subtitle">with Justin Wolfers</p>

        <p class="coming-soon">Coming soon...</p>
    </div>

    <footer>&copy; 2026 Justin Wolfers</footer>
</body>
</html>
